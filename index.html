<!DOCTYPE html>
<html>
<head>
    <title>Product Browser</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            max-width:1200px;
            margin:auto;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        .filters{
            display:flex;
            gap:10px;
            margin-bottom:20px;
            flex-wrap:wrap;
        }

        input,select,button{
            padding:10px;
        }

        .products{
            display:grid;
            grid-template-columns:
            repeat(auto-fill,minmax(250px,1fr));
            gap:15px;
        }

        .card{
            border:1px solid #ddd;
            padding:15px;
            border-radius:10px;
        }

        .card h3{
            margin:0;
        }

        .next-btn{
            margin-top:20px;
            width:100%;
        }

    </style>
</head>

<body>

<h1>Product Browser</h1>

<div class="filters">

    <select id="category">

        <option value="">All Categories</option>

        <option value="Books">
            Books
        </option>

        <option value="Electronics">
            Electronics
        </option>

        <option value="Fashion">
            Fashion
        </option>

        <option value="Sports">
            Sports
        </option>

        <option value="Gaming">
            Gaming
        </option>

    </select>

    <input
        type="number"
        id="minPrice"
        placeholder="Min Price"
    >

    <input
        type="number"
        id="maxPrice"
        placeholder="Max Price"
    >

    <button onclick="applyFilters()">
        Apply Filters
    </button>

</div>

<div
    class="products"
    id="products"
></div>

<button
    class="next-btn"
    onclick="loadMore()"
>
    Next Page
</button>

<script>

let cursor = null;

const API_URL =
"http://127.0.0.1:8000/products";

async function fetchProducts(reset=false){

    let category =
    document.getElementById("category").value;

    let minPrice =
    document.getElementById("minPrice").value;

    let maxPrice =
    document.getElementById("maxPrice").value;

    let url = API_URL + "?";

    if(category){

        url +=
        `category=${category}&`;
    }

    if(minPrice){

        url +=
        `min_price=${minPrice}&`;
    }

    if(maxPrice){

        url +=
        `max_price=${maxPrice}&`;
    }

    if(cursor){

        url +=
        `cursor=${cursor}`;
    }

    const response =
    await fetch(url);

    const data =
    await response.json();

    cursor =
    data.next_cursor;

    const container =
    document.getElementById("products");

    if(reset){

        container.innerHTML="";
    }

    data.products.forEach(product=>{

        container.innerHTML += `

        <div class="card">

            <h3>
                ${product.name}
            </h3>

            <p>
                Category:
                ${product.category}
            </p>

            <p>
                Price:
                ₹${product.price}
            </p>

            <small>
                ${product.created_at}
            </small>

        </div>

        `;

    });

}

function applyFilters(){

    cursor = null;

    fetchProducts(true);
}

function loadMore(){

    fetchProducts(false);
}

fetchProducts(true);

</script>

</body>
</html>
